# AppSec Crew — configuration template (copy into the root of the repository you scan).
#
# This file lives in the appsec-crew repo as the canonical example. Consumers should copy it to
# `<your-repo>/appsec_crew.yaml`. If that file is missing, the CLI uses the packaged
# `src/appsec_crew/bundled_appsec_crew.yaml` (same shape; Jira / webhook / Splunk off by default).
#
# Precedence: non-empty YAML values override environment variables for secrets.
#
# CrewAI: every enabled agent needs `llm.api_key` or `llm.api_key_env`.
#
# PR vs batch (GitHub Actions sets GITHUB_EVENT_NAME automatically):
#   - pull_request / pull_request_target + a resolved PR number → comments / PR review on that PR only
#     (no Issues from Betterleaks or OSV; Semgrep as inline review, not an autofix branch).
#   - schedule, workflow_dispatch, push, … → Issues for secrets & OSV; Semgrep tries an autofix PR or opens
#     a tracking Issue if autofix produces no commit.
#   - Local testing of “PR mode”: set GITHUB_EVENT_NAME=pull_request and APPSEC_CREW_PR_NUMBER=<n> (and
#     GITHUB_TOKEN / GITHUB_REPOSITORY as usual).
#
# Tool-native allowlists (in the scanned repo, not duplicated here):
#   - Betterleaks / Gitleaks: `.betterleaks.toml` or `.gitleaks.toml`
#     (Betterleaks: https://github.com/betterleaks/betterleaks — Gitleaks-compatible options)
#   - OSV-Scanner: `osv-scanner.toml` — start from this repo’s examples/osv-scanner.toml.example
#     (upstream: https://google.github.io/osv-scanner/configuration/ )
#   - Semgrep: `.semgrep.yml` — see examples/semgrep-local-rules.example.yml
#     (upstream: https://semgrep.dev/docs/writing-rules/rule-syntax/ )
#
# Scanner scope: by default the workspace is scanned recursively (Betterleaks `dir` on the repo tree,
# OSV `scan -r`, Semgrep `scan` on the repo root). Stderr logs each invocation as JSON with full argv.
#
# Tool block (per agent): optional `version` pins the binary/Semgrep release for the reusable GitHub Actions
# workflow (`agents.secrets_reviewer.tools.betterleaks.version`, `…osv_scanner.version`, `…semgrep.version`).
# Omit `version` to use packaged defaults.
#
# Tool CLI overrides (per agent `tools` block):
#   - betterleaks: `version`, `extra_args` (list), `command` (optional full template: {binary} {repo} {report} {config})
#   - osv_scanner: `version`, `scan_extra_args`, `scan_command` (same placeholders + {config} on scan);
#     `fix_extra_args` exists in schema for compatibility but batch runs no longer invoke `osv-scanner fix`.
#   - semgrep: `version`, `extra_args`, `command` — include a space before `--json`, e.g.
#     "{binary} scan {autofix}{config_args} --json -o {report} {repo}"
#   - `llm_triage: false` under a tool disables the false-positive triage pass for that agent (default true).

global:
  # Minimum severity for dependency (CVSS) and Semgrep findings.
  # Values: critical | high | medium | low
  min_severity: high
  github:
    token_env: GITHUB_TOKEN
    # token: use only if you must override GITHUB_TOKEN from a secret manager (never commit real tokens).

agents:
  secrets_reviewer:
    enabled: true
    llm:
      model: gpt-4o-mini
      api_key_env: OPENAI_API_KEY
      base_url: null
      temperature: 0
    tools:
      betterleaks:
        binary: betterleaks
        version: v1.1.1
        config_path: null

  dependencies_reviewer:
    enabled: true
    llm:
      model: gpt-4o-mini
      api_key_env: OPENAI_API_KEY
    tools:
      osv_scanner:
        binary: osv-scanner
        version: v2.3.3
        config_path: null

  code_reviewer:
    enabled: true
    llm:
      model: gpt-4o-mini
      api_key_env: OPENAI_API_KEY
    tools:
      semgrep:
        binary: semgrep
        version: "1.156.0"
        config_path: null
        extra_configs:
          - auto
          - p/security-audit
          - p/python
          - p/javascript
          - p/typescript
          - p/java
          - p/golang
          - p/rust

  reporter:
    enabled: true
    llm:
      model: gpt-4o-mini
      api_key_env: OPENAI_API_KEY
    tools:
      # In this template and in the bundled default: no Jira / webhook / Splunk.
      # Enable them here when you maintain your own `appsec_crew.yaml`.
      jira:
        enabled: false
        base_url: https://your-company.atlassian.net
        project_key: SEC
        issue_type: Task
        email_env: JIRA_EMAIL
        api_token_env: JIRA_API_TOKEN
      webhook:
        enabled: false
        url_env: APPSEC_WEBHOOK_URL
        url: ""
        headers: {}
        header_secrets: {}
      splunk:
        enabled: false
        hec_url_env: SPLUNK_HEC_URL
        hec_url: ""
        token_env: SPLUNK_HEC_TOKEN
        source: appsec_crew
        sourcetype: _json
