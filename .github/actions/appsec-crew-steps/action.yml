# Shared install + run steps for appsec-crew-reusable.yml (avoids duplicating steps across jobs).
# Clones celagus/appsec-crew using the ref suffix of github.workflow_ref (path@refs/heads/…, @tag, or @sha)
# for this reusable workflow — i.e. the same @ref the caller put on `uses: …/appsec-crew-reusable.yml@ref`.
# Falls back to github.workflow_sha if parsing yields nothing.
name: AppSec Crew steps
description: Checkout, install scanners, run AppSec Crew on the caller workspace

inputs:
  scan_path:
    required: true
  config_file:
    required: true
  github_token:
    description: Passed to checkout (private crew repo) and appsec-crew (GitHub API)
    required: true
  github_repository:
    required: true
  openai_api_key:
    required: false
    default: ""
  jira_email:
    required: false
    default: ""
  jira_api_token:
    required: false
    default: ""
  appsec_webhook_url:
    required: false
    default: ""
  splunk_hec_url:
    required: false
    default: ""
  splunk_hec_token:
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Resolve celagus/appsec-crew ref from reusable workflow
      id: crew_ref
      shell: bash
      run: |
        set -euo pipefail
        wf_ref="${{ github.workflow_ref }}"
        ref="${wf_ref#*@}"
        if [ -z "${ref}" ]; then
          ref="${{ github.workflow_sha }}"
        fi
        if [ -z "${ref}" ]; then
          echo "::error::Empty ref after github.workflow_ref/github.workflow_sha"
          exit 1
        fi
        echo "ref=${ref}" >> "${GITHUB_OUTPUT}"

    - name: Checkout caller repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Checkout celagus/appsec-crew (same @ref as this reusable workflow)
      uses: actions/checkout@v4
      with:
        repository: celagus/appsec-crew
        ref: ${{ steps.crew_ref.outputs.ref }}
        path: .appsec-crew-checkout
        token: ${{ inputs.github_token }}

    - name: Git safe.directory (Semgrep / git-aware tools)
      shell: bash
      run: git config --global --add safe.directory '*'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Resolve scanner versions from appsec_crew.yaml
      id: tool_versions
      shell: bash
      env:
        SCAN_PATH: ${{ inputs.scan_path }}
        CONFIG_FILE: ${{ inputs.config_file }}
      run: |
        set -euo pipefail
        pip install --disable-pip-version-check 'pyyaml>=6'
        CREW_SRC="${GITHUB_WORKSPACE}/.appsec-crew-checkout/src"
        if [ ! -d "${CREW_SRC}/appsec_crew" ]; then
          echo "::error::Expected appsec_crew under ${CREW_SRC} after checkout."
          exit 1
        fi
        export PYTHONPATH="${CREW_SRC}"
        REPO_ROOT="${GITHUB_WORKSPACE}/${SCAN_PATH}"
        ARGS=(--repo "${REPO_ROOT}")
        if [ -n "${CONFIG_FILE}" ]; then
          ARGS+=(--config "${CONFIG_FILE}")
        fi
        python -m appsec_crew.ci_versions "${ARGS[@]}"

    - name: Install OSV-Scanner
      shell: bash
      env:
        VERSION: ${{ steps.tool_versions.outputs.osv_scanner_version }}
      run: |
        set -euxo pipefail
        curl -sSL "https://github.com/google/osv-scanner/releases/download/${VERSION}/osv-scanner_linux_amd64" -o /usr/local/bin/osv-scanner
        chmod +x /usr/local/bin/osv-scanner
        osv-scanner --version

    - name: Install Betterleaks
      shell: bash
      env:
        VERSION: ${{ steps.tool_versions.outputs.betterleaks_version }}
      run: |
        set -euxo pipefail
        ver="${VERSION#v}"
        curl -sSL "https://github.com/betterleaks/betterleaks/releases/download/${VERSION}/betterleaks_${ver}_linux_x64.tar.gz" -o /tmp/bl.tgz
        tar -xzf /tmp/bl.tgz -C /tmp
        install -m 0755 /tmp/betterleaks /usr/local/bin/betterleaks
        betterleaks version

    - name: Install Semgrep + AppSec Crew
      shell: bash
      env:
        SEMGREP_VERSION: ${{ steps.tool_versions.outputs.semgrep_version }}
      run: |
        set -euxo pipefail
        python -m pip install --upgrade pip
        pip install "semgrep==${SEMGREP_VERSION}"
        pip install "./.appsec-crew-checkout"

    - name: Run AppSec Crew
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
        GITHUB_REPOSITORY: ${{ inputs.github_repository }}
        OPENAI_API_KEY: ${{ inputs.openai_api_key }}
        JIRA_EMAIL: ${{ inputs.jira_email }}
        JIRA_API_TOKEN: ${{ inputs.jira_api_token }}
        APPSEC_WEBHOOK_URL: ${{ inputs.appsec_webhook_url }}
        SPLUNK_HEC_URL: ${{ inputs.splunk_hec_url }}
        SPLUNK_HEC_TOKEN: ${{ inputs.splunk_hec_token }}
        GIT_COMMITTER_NAME: appsec-crew
        GIT_COMMITTER_EMAIL: appsec-crew@users.noreply.github.com
      run: |
        set -euo pipefail
        if [ -n "${{ inputs.config_file }}" ]; then
          appsec-crew --repo "${{ inputs.scan_path }}" --config "${{ inputs.config_file }}"
        else
          appsec-crew --repo "${{ inputs.scan_path }}"
        fi
