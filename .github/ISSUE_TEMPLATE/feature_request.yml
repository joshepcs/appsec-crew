name: Feature request
description: Suggest an idea for AppSec Crew
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to achieve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How could AppSec Crew help? Optional design notes.
    validations:
      required: true
