# Reusable workflow: install Betterleaks, OSV-Scanner, Semgrep; run AppSec Crew on the caller checkout.
#
# Bootstrap: checkout celagus/appsec-crew into `.appsec-crew-checkout` first. A relative `uses: ./.github/actions/…`
# in a reusable workflow resolves against the **caller** workspace, so the composite cannot live at `./.github/...`
# until that tree exists under $GITHUB_WORKSPACE.
#
# Ref for the clone: suffix of github.workflow_ref after `@` when it exists on celagus/appsec-crew.
# On caller `pull_request` events, workflow_ref often ends in `refs/pull/N/merge` (caller-only) — then use
# github.workflow_sha (commit GitHub resolved for this reusable workflow on celagus/appsec-crew).
#
# Optional `github_environment`: secrets only on a GitHub Environment (callers cannot set `environment:` on `uses:`).
name: AppSec Crew (reusable)

on:
  workflow_call:
    inputs:
      scan_path:
        type: string
        description: Directory to scan (usually repository root ".")
        default: "."
      config_file:
        type: string
        description: >
          Path to appsec_crew.yaml relative to repository root. Leave empty to auto-resolve:
          use appsec_crew.yaml in scan_path if present, otherwise the bundled default
          (reporter Jira/webhook/Splunk disabled).
        default: ""
      github_environment:
        type: string
        description: >
          Optional GitHub Environment name for this job. Use when secrets (OPENAI_API_KEY, etc.) are defined
          only on that environment — callers cannot set `environment:` on a reusable-workflow `uses:` job.
        default: ""

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  appsec-crew:
    if: ${{ inputs.github_environment == '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Resolve celagus/appsec-crew ref
        id: crew_ref
        shell: bash
        run: |
          set -euo pipefail
          # Keep in sync with appsec_crew.resolve_crew_checkout_ref (pytest: tests/test_resolve_crew_checkout_ref.py)
          wf_ref="${{ github.workflow_ref }}"
          ref="${wf_ref#*@}"
          # refs/pull/* exist only on the caller repo, not on celagus/appsec-crew
          case "${ref}" in
            refs/pull/*|"")
              ref="${{ github.workflow_sha }}"
              ;;
          esac
          if [ -z "${ref}" ]; then
            echo "::error::Could not resolve ref for celagus/appsec-crew checkout"
            exit 1
          fi
          echo "celagus/appsec-crew checkout ref=${ref}" >&2
          echo "ref=${ref}" >> "${GITHUB_OUTPUT}"

      - name: Checkout celagus/appsec-crew (composite + pip install)
        uses: actions/checkout@v6
        with:
          repository: celagus/appsec-crew
          ref: ${{ steps.crew_ref.outputs.ref }}
          path: .appsec-crew-checkout
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.appsec-crew-checkout/.github/actions/appsec-crew-steps
        with:
          scan_path: ${{ inputs.scan_path }}
          config_file: ${{ inputs.config_file }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          github_repository: ${{ github.repository }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          jira_email: ${{ secrets.JIRA_EMAIL }}
          jira_api_token: ${{ secrets.JIRA_API_TOKEN }}
          appsec_webhook_url: ${{ secrets.APPSEC_WEBHOOK_URL }}
          splunk_hec_url: ${{ secrets.SPLUNK_HEC_URL }}
          splunk_hec_token: ${{ secrets.SPLUNK_HEC_TOKEN }}

  appsec-crew-with-environment:
    if: ${{ inputs.github_environment != '' }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.github_environment }}
    steps:
      - name: Resolve celagus/appsec-crew ref
        id: crew_ref
        shell: bash
        run: |
          set -euo pipefail
          # Keep in sync with appsec_crew.resolve_crew_checkout_ref (pytest: tests/test_resolve_crew_checkout_ref.py)
          wf_ref="${{ github.workflow_ref }}"
          ref="${wf_ref#*@}"
          case "${ref}" in
            refs/pull/*|"")
              ref="${{ github.workflow_sha }}"
              ;;
          esac
          if [ -z "${ref}" ]; then
            echo "::error::Could not resolve ref for celagus/appsec-crew checkout"
            exit 1
          fi
          echo "celagus/appsec-crew checkout ref=${ref}" >&2
          echo "ref=${ref}" >> "${GITHUB_OUTPUT}"

      - name: Checkout celagus/appsec-crew (composite + pip install)
        uses: actions/checkout@v6
        with:
          repository: celagus/appsec-crew
          ref: ${{ steps.crew_ref.outputs.ref }}
          path: .appsec-crew-checkout
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.appsec-crew-checkout/.github/actions/appsec-crew-steps
        with:
          scan_path: ${{ inputs.scan_path }}
          config_file: ${{ inputs.config_file }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          github_repository: ${{ github.repository }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          jira_email: ${{ secrets.JIRA_EMAIL }}
          jira_api_token: ${{ secrets.JIRA_API_TOKEN }}
          appsec_webhook_url: ${{ secrets.APPSEC_WEBHOOK_URL }}
          splunk_hec_url: ${{ secrets.SPLUNK_HEC_URL }}
          splunk_hec_token: ${{ secrets.SPLUNK_HEC_TOKEN }}
