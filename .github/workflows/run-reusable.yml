# Runs AppSec Crew against this repository (PR, schedule, manual).
name: appsec-crew run

on:
  workflow_dispatch:
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

concurrency:
  group: dogfood-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  crew:
    uses: ./.github/workflows/appsec-crew-reusable.yml
    with:
      scan_path: .
      config_file: ""
    secrets: inherit
