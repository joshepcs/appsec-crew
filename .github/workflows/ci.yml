name: CI

on:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Job id `test` keeps existing branch-protection required checks stable.
  test:
    name: Test and security scanners
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Git safe.directory (Semgrep / git-aware scanners)
        run: git config --global --add safe.directory '*'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Resolve scanner versions from appsec_crew.yaml
        id: tool_versions
        run: python -m appsec_crew.ci_versions --repo "${GITHUB_WORKSPACE}"

      - name: Install OSV-Scanner
        env:
          VERSION: ${{ steps.tool_versions.outputs.osv_scanner_version }}
        run: |
          set -euxo pipefail
          curl -sSL "https://github.com/google/osv-scanner/releases/download/${VERSION}/osv-scanner_linux_amd64" -o /usr/local/bin/osv-scanner
          chmod +x /usr/local/bin/osv-scanner
          osv-scanner --version

      - name: Install Betterleaks
        env:
          VERSION: ${{ steps.tool_versions.outputs.betterleaks_version }}
        run: |
          set -euxo pipefail
          ver="${VERSION#v}"
          curl -sSL "https://github.com/betterleaks/betterleaks/releases/download/${VERSION}/betterleaks_${ver}_linux_x64.tar.gz" -o /tmp/bl.tgz
          tar -xzf /tmp/bl.tgz -C /tmp
          install -m 0755 /tmp/betterleaks /usr/local/bin/betterleaks
          betterleaks version

      - name: Install Semgrep (version from appsec_crew.yaml)
        env:
          SEMGREP_VERSION: ${{ steps.tool_versions.outputs.semgrep_version }}
        run: |
          set -euxo pipefail
          pip install "semgrep==${SEMGREP_VERSION}"
          semgrep --version

      - name: Run tests (pytest)
        run: pytest -q --tb=short

      - name: Betterleaks (working tree)
        run: |
          set -euxo pipefail
          betterleaks dir --no-banner -f json -r /tmp/betterleaks-ci.json "${GITHUB_WORKSPACE}"

      - name: OSV-Scanner (minimum severity MEDIUM / CVSS floor)
        run: python scripts/ci_osv_gate.py --repo "${GITHUB_WORKSPACE}" --min-severity medium

      # No --config auto: Semgrep requires metrics for "auto" when SEMGREP_SEND_METRICS=off.
      # p/yaml is not a Registry pack (404); p/github-actions covers workflow YAML under .github/.
      - name: Semgrep (WARNING and ERROR only; fail on findings)
        env:
          SEMGREP_SEND_METRICS: off
        run: |
          set -euxo pipefail
          semgrep scan \
            --config p/security-audit \
            --config p/python \
            --config p/github-actions \
            --severity WARNING \
            --severity ERROR \
            --error \
            --disable-version-check \
            "${GITHUB_WORKSPACE}"
