# Bundled default — used when the scanned repository has no `appsec_crew.yaml`.
# Canonical human-edited template: appsec_crew.yaml at the root of the appsec-crew repository (copy that
# file into your app repo to customize). This bundled copy stays in sync as the package fallback.
#
# Jira, webhook, and Splunk stay disabled here. PR vs batch behavior follows GITHUB_EVENT_NAME and PR number
# (see appsec_crew.yaml header in the appsec-crew repo).
#
# CrewAI: each enabled agent needs `llm.api_key` or `llm.api_key_env`.
#
# Tool configs in the scanned repo: .betterleaks.toml / .gitleaks.toml, osv-scanner.toml, .semgrep.yml.
# Examples ship under examples/ in the appsec-crew repo (osv-scanner.toml.example, semgrep-local-rules.example.yml).

global:
  min_severity: high
  github:
    token_env: GITHUB_TOKEN

agents:
  secrets_reviewer:
    enabled: true
    llm:
      model: gpt-4o-mini
      api_key_env: OPENAI_API_KEY
      base_url: null
      temperature: 0
    tools:
      betterleaks:
        binary: betterleaks
        version: v1.1.1
        config_path: null
        # extra_args: []          # appended to default CLI
        # command: null          # or full template: "{binary} dir --no-banner -f json -r {report} {repo}"
        # llm_triage: true       # opt-in LLM false-positive pass (default off)

  dependencies_reviewer:
    enabled: true
    llm:
      model: gpt-4o-mini
      api_key_env: OPENAI_API_KEY
    tools:
      osv_scanner:
        binary: osv-scanner
        version: v2.3.3
        config_path: null
        # scan_extra_args: []
        # scan_command: null     # "{binary} scan -r -f json --output {report} {repo}" pattern if overriding
        # fix_extra_args: []     # reserved; batch flow does not open OSV remediation PRs
        # llm_triage: true      # opt-in (default off)

  code_reviewer:
    enabled: true
    llm:
      model: gpt-4o-mini
      api_key_env: OPENAI_API_KEY
    tools:
      semgrep:
        binary: semgrep
        version: "1.156.0"
        config_path: null
        # extra_args: []
        # command: null          # "{binary} scan {autofix}{config_args} --json -o {report} {repo}"
        # llm_triage: true      # opt-in (default off)
        extra_configs:
          - auto
          - p/security-audit
          - p/python
          - p/javascript
          - p/typescript
          - p/java
          - p/golang
          - p/rust

  reporter:
    enabled: true
    llm:
      model: gpt-4o-mini
      api_key_env: OPENAI_API_KEY
    tools:
      jira:
        enabled: false
        base_url: https://your-company.atlassian.net
        project_key: SEC
        issue_type: Task
        email_env: JIRA_EMAIL
        api_token_env: JIRA_API_TOKEN
      webhook:
        enabled: false
        url_env: APPSEC_WEBHOOK_URL
        url: ""
        headers: {}
        header_secrets: {}
      splunk:
        enabled: false
        hec_url_env: SPLUNK_HEC_URL
        hec_url: ""
        token_env: SPLUNK_HEC_TOKEN
        source: appsec_crew
        sourcetype: _json
