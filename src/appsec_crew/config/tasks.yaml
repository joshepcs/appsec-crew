secrets_reviewer_task:
  description: >
    Call `secrets_reviewer_workflow` exactly once. The tool runs Betterleaks over the whole repo workspace,
    prints the exact shell command to stderr, triages mock/test/placeholder secrets, and returns JSON including
    `commands_executed`, `scanner_findings_total`, `findings_after_triage`, and `dismissed_findings`. Do not invent findings.
  expected_output: >
    JSON string from the tool (issue URLs, command lines, triage fields, counts).
  agent: secrets_reviewer

dependencies_reviewer_task:
  description: >
    Call `dependencies_reviewer_workflow` exactly once after secrets finished. The tool runs recursive OSV scan,
    logs osv-scanner argv, triages dependency false positives, then may open a PR. JSON includes `commands_executed`
    and `dismissed_findings` when applicable.
  expected_output: >
    JSON string from the tool (PR URL if any, commands, dismissed rows summary).
  agent: dependencies_reviewer

code_reviewer_task:
  description: >
    Call `code_reviewer_workflow` exactly once after dependency review finished. The tool runs Semgrep on the repo
    (recursive workspace scan), logs argv for each run, triages false positives, then may open an autofix PR.
  expected_output: >
    JSON string from the tool (language hint, PR URL, commands, dismissed findings).
  agent: code_reviewer

reporter_task:
  description: >
    Call `reporter_workflow` exactly once last. The Markdown summary must surface dismissed/triaged findings and
    the commands that were executed, as produced by upstream workflows.
  expected_output: >
    Markdown summary suitable for GitHub comments, including dismissed findings sections when non-empty.
  agent: reporter
